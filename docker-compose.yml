##############################################################################
# LLM Development Stack
# Ollama (GPU-accelerated model server) + Arch Linux (dev workstation)
#
# Usage:
#   docker compose up -d ollama_palace       # Start and setup model server
#   docker compose run --rm llm_dev          # Spawn a throwaway dev shell
#   docker compose run --rm llm_dev opencode # Jump straight into OpenCode
##############################################################################

services:
  # ──────────────────────────────────────────────────────────────────────────
  # Ollama — GPU-accelerated LLM inference server
  # ──────────────────────────────────────────────────────────────────────────
  ollama_palace:
    build:
      context: .
      dockerfile: Dockerfile.ollama
    image: hgonomeg-ollama:latest
    container_name: ollama_palace
    restart: unless-stopped
    ports:
      - "127.0.0.1:11434:11434"
      # - "172.23.215.20:11434:11434"
      # - "192.168.192.4:11434:11434"
      # - "192.168.122.1:11434:11434"
      #- ""
    volumes:
      - ollama_data:/root/.ollama
    environment:
      - OLLAMA_HOST=0.0.0.0
      - OLLAMA_KEEP_ALIVE=24h
      - OLLAMA_NUM_PARALLEL=2
      - OLLAMA_MAX_LOADED_MODELS=3
      - OLLAMA_FLASH_ATTENTION=1
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    healthcheck:
      #test: ["CMD-SHELL", "curl -sf http://localhost:11434/api/tags || exit 1"]
      test: ["CMD", "ollama", "list"]
      interval: 6s
      timeout: 5s
      retries: 10
      start_period: 35s
    networks:
      - llm_net

  # ──────────────────────────────────────────────────────────────────────────
  # LLM Dev — Arch Linux workstation (throwaway containers)
  # ──────────────────────────────────────────────────────────────────────────
  llm_dev:
    build:
      context: .
      dockerfile: Dockerfile.llm_dev
    image: hgonomeg-llm-dev:latest
    stdin_open: true
    tty: true
    depends_on:
      ollama_palace:
        condition: service_healthy
      searxng_llm:
        condition: service_started
    volumes:
      - ${HOME}/.gitconfig:/home/dev/.gitconfig:ro
    environment:
      - OLLAMA_HOST=http://ollama_palace:11434
      - TERM=xterm-256color
    working_dir: /workspace
    networks:
      - llm_net

  # ──────────────────────────────────────────────────────────────────────────
  # Searxng — Container to host Searxng
  # ──────────────────────────────────────────────────────────────────────────
  searxng_llm:
    image: searxng/searxng:latest
    container_name: searxng_llm
    restart: unless-stopped
    ports:
      # port on the right is container-local
      # port on the left is systemwide port
      - "127.0.0.1:8888:8080"
    volumes:
      - ./searxng_configs:/etc/searxng:rw
      - searxng_cache:/var/cache/searxng:rw
    environment:
      - SEARXNG_BASE_URL=http://localhost:8888/
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - SETGID
      - SETUID
      - DAC_OVERRIDE
    networks:
      - llm_net

  open_webui:
    image: ghcr.io/open-webui/open-webui:main
    container_name: open_webui
    restart: unless-stopped
    ports:
      # port on the right is container-local
      # port on the left is systemwide port
      - "127.0.0.1:11436:8080"
      - "172.23.215.20:11436:8080"
    volumes:
      - openwebui_data:/app/backend/data
    environment:
      - OLLAMA_BASE_URL=http://ollama_palace:11434
      - WEBUI_AUTH=False # skip login for single-user
    depends_on:
      ollama_palace:
        condition: service_healthy
    networks:
      - llm_net

volumes:
  ollama_data:
    name: ollama_data
    ## Custom path config
    # driver: local
    # driver_opts:
    #   type: none
    #   o: bind
    #   device: /magazyn/piwnica/ollama_data_volume
  searxng_cache:
    name: searxng_cache
    ## Custom path config
    # driver: local
    # driver_opts:
    #   type: none
    #   o: bind
    #   device: /magazyn/piwnica/searxng_cache_volume
  openwebui_data:
    name: openwebui_data
    ## Custom path config
    # driver: local
    # driver_opts:
    #   type: none
    #   o: bind
    #   device: /magazyn/piwnica/openwebui_data_volume

networks:
  llm_net:
    name: llm-net
